name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    name: ${{ matrix.os }} / py${{ matrix.python }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Scanner suite (pure stdlib, fully offline)
        working-directory: .claude/skills/review-site/tools
        run: python -m unittest test_review_tools
      - name: Report builder suite
        working-directory: .claude/skills/review-site
        run: |
          pip install -r ../../../requirements.txt
          python -m unittest test_exec_report
